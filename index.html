
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Mobile Bar — Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{--gold:#C9A84C;--gold2:#f0d080;--dark:#0d0d0d;--dark2:#141414;--dark3:#1c1c1c;--card:#181818;--border:#2a2a2a;--green:#39FF14;--cyan:#00e5ff;--red:#ff4444;--text:#f0e8d8;--muted:#666;--radius:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;padding-bottom:80px;}
.hdr{background:linear-gradient(160deg,#0d0d0d,#1c1000);border-bottom:1px solid #2a1a00;padding:16px 16px 12px;text-align:center;}
.hdr h1{font-family:'Cinzel',serif;font-size:clamp(18px,5vw,28px);color:var(--gold);letter-spacing:3px;}
.hdr p{font-size:10px;color:var(--muted);letter-spacing:2px;margin-top:2px;}
.prog{background:var(--dark2);border-bottom:1px solid var(--border);padding:14px 8px;display:flex;align-items:center;justify-content:center;overflow-x:auto;gap:0;}
.sdot{display:flex;flex-direction:column;align-items:center;gap:3px;padding:0 5px;cursor:pointer;}
.sci{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);background:var(--dark3);transition:all .3s;}
.sci.done{background:var(--gold);border-color:var(--gold);color:#000;}
.sci.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.12);}
.slbl{font-size:8px;letter-spacing:.8px;color:var(--muted);text-transform:uppercase;white-space:nowrap;}
.slbl.active{color:var(--gold);}
.sline{width:20px;height:2px;background:var(--border);flex-shrink:0;}
.sline.done{background:var(--gold);}
.screen{display:none;max-width:500px;margin:0 auto;padding:20px 14px;}
.screen.active{display:block;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.card-title{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:1.5px;margin-bottom:14px;}
/* AVISO ACCESO */
.acceso-banner{background:rgba(255,68,68,.06);border:1px solid rgba(255,68,68,.25);border-radius:var(--radius);padding:13px 16px;margin-bottom:14px;}
.acceso-main{display:flex;align-items:center;gap:10px;}
.acceso-icon{font-size:18px;flex-shrink:0;}
.acceso-text{font-size:13px;color:#ffcccc;font-weight:600;flex:1;line-height:1.4;}
.acceso-dot{width:22px;height:22px;border-radius:50%;background:var(--gold);color:#000;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;}
.acceso-hint{font-size:10px;color:var(--gold);margin-top:5px;padding-left:28px;cursor:pointer;letter-spacing:.5px;}
.acceso-hint:hover{text-decoration:underline;}
.warning-body{padding:0;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s;}
.warning-body.open{max-height:300px;padding:10px 0 2px;}
.warning-body p{font-size:12.5px;color:#ffcccc;line-height:1.8;}
/* INGREDIENT INLINE PANEL — same toggle pattern as acceso-banner */
.ing-body{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .25s;background:rgba(201,168,76,.07);border-radius:0 0 8px 8px;border:0 solid rgba(201,168,76,.2);border-top:none;}
.ing-body.open{max-height:400px;padding:10px 12px 12px;border-width:1px;}
.ing-body .ing-title{font-size:11px;font-weight:800;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.ing-body .ing-brand{font-size:11px;color:var(--gold2);margin-bottom:6px;background:rgba(201,168,76,.1);padding:4px 8px;border-radius:5px;display:inline-block;}
.ing-body ul{padding-left:16px;margin:0;}
.ing-body li{font-size:12px;color:#ccc;line-height:1.8;}
.fchip-wrap{display:inline-flex;flex-direction:column;margin:3px;}
.fchip-wrap .fchip{margin:0;border-radius:8px 8px 0 0;}
.fchip-wrap .ing-body.open ~ * , .fchip-wrap.open-info .fchip{border-radius:8px 8px 0 0;}
.menu-chip-wrap{display:inline-flex;flex-direction:column;margin:3px 3px 6px;}
.menu-chip-wrap .menu-chip{margin:0;border-radius:8px 8px 0 0;}
.extra-note{background:rgba(255,68,68,.1);border-radius:8px;padding:9px 12px;margin-top:8px;font-size:12px;color:#ffaaaa;line-height:1.7;}
/* INFO / INCLUDES BANNERS */
.info-banner{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.2);border-radius:9px;padding:11px 14px;font-size:12px;color:var(--gold2);line-height:1.7;margin-bottom:14px;}
.info-banner strong{color:var(--gold);}
.includes-banner{background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.15);border-radius:9px;padding:11px 14px;font-size:12px;color:#aaeeff;line-height:1.8;margin-top:14px;}
.includes-banner strong{color:var(--cyan);display:block;margin-bottom:4px;font-size:11px;letter-spacing:1px;text-transform:uppercase;}
/* FIELDS */
.field{margin-bottom:12px;}
.field label{display:block;font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;background:var(--dark3);border:1px solid var(--border);color:var(--text);padding:11px 13px;border-radius:9px;font-family:'Nunito',sans-serif;font-size:14px;transition:border-color .2s;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold);}
.field select option{background:#1c1c1c;}
.field textarea{resize:vertical;min-height:55px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field-hint{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.4;}
.req-star{color:var(--red);}
/* CHOICE */
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px;}
.choice-btn{background:var(--dark3);border:2px solid var(--border);border-radius:var(--radius);padding:18px 12px;cursor:pointer;text-align:center;transition:all .22s;}
.choice-btn:hover{border-color:var(--gold);transform:translateY(-2px);}
.choice-btn.selected{border-color:var(--gold);background:rgba(201,168,76,.09);}
.choice-icon{font-size:28px;margin-bottom:8px;}
.choice-name{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:1px;}
.choice-desc{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.4;}
/* PACKAGES */
.paq-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.paq-card{background:var(--dark3);border:2px solid var(--border);border-radius:var(--radius);padding:13px;cursor:pointer;transition:all .2s;}
.paq-card:hover{border-color:var(--gold);transform:translateY(-2px);}
.paq-card.selected{border-color:var(--gold);background:rgba(201,168,76,.08);}
.paq-num{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.paq-cock{font-size:24px;font-weight:800;color:var(--text);}
.paq-unit{font-size:10px;color:var(--muted);}
.paq-dur{font-size:10px;color:var(--cyan);margin-top:3px;}
.custom-box{background:var(--dark3);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:12px;}
.cb-title{font-size:11px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
.custom-note{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--gold2);line-height:1.6;margin-top:10px;}
/* CATEGORY */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cat-card{background:var(--dark3);border:2px solid var(--border);border-radius:var(--radius);padding:14px 10px;cursor:pointer;transition:all .2s;text-align:center;}
.cat-card:hover{border-color:var(--gold);transform:translateY(-2px);}
.cat-card.selected{border-color:var(--gold);background:rgba(201,168,76,.08);}
.cat-icon{font-size:22px;margin-bottom:5px;}
.cat-name{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);letter-spacing:1px;}
.cat-desc{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.4;}
/* FLAVOR STEP */
.flavor-slots{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
.fslot{flex:1;min-width:calc(33% - 7px);background:var(--dark3);border:2px dashed var(--border);border-radius:10px;padding:10px 6px;text-align:center;font-size:10px;color:var(--muted);min-height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;}
.fslot.alc{border:2px solid #e74c3c;background:rgba(231,76,60,.06);}
.fslot.noalc{border:2px solid #2ecc71;background:rgba(46,204,113,.06);}
.fslot-tag{font-size:8px;letter-spacing:.5px;}
.fslot-name{font-size:11px;font-weight:700;color:var(--text);line-height:1.3;}
.fslot-rm{font-size:14px;cursor:pointer;color:var(--muted);}
.fslot-rm:hover{color:var(--red);}
.flavor-tip{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:9px 12px;font-size:11px;color:var(--gold2);margin-bottom:12px;text-align:center;}
/* FLAVOR CATEGORIES in step 3 */
.fcat-section{margin-bottom:16px;}
.fcat-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.fcat-label{font-size:10px;letter-spacing:1.5px;color:var(--cyan);text-transform:uppercase;}
.fcat-brand{font-size:10px;color:var(--muted);font-style:italic;}
.fchips{display:flex;flex-wrap:wrap;gap:6px;}
.fchip{padding:7px 10px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .15s;user-select:none;border:1px solid transparent;display:inline-flex;align-items:center;gap:5px;}
.fchip.alc{background:rgba(231,76,60,.1);border-color:rgba(231,76,60,.3);color:#ffaaaa;}
.fchip.alc:hover{background:rgba(231,76,60,.22);}
.fchip.noalc{background:rgba(46,204,113,.1);border-color:rgba(46,204,113,.3);color:#aaffcc;}
.fchip.noalc:hover{background:rgba(46,204,113,.22);}
.fchip.taken{opacity:.25;cursor:not-allowed;pointer-events:none;}
.info-dot{width:20px;height:20px;border-radius:50%;background:var(--gold);color:#000;font-size:10px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;pointer-events:auto;cursor:pointer;border:none;padding:0;margin-left:4px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
/* POPUP */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.popup-box{background:var(--card);border:1px solid var(--gold);border-radius:var(--radius);padding:22px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto;}
.popup-name{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);margin-bottom:4px;}
.popup-type{font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.popup-brand{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:7px;padding:8px 12px;font-size:13px;color:var(--gold2);margin-bottom:10px;}
.popup-section h4{font-size:10px;letter-spacing:1.5px;color:var(--cyan);text-transform:uppercase;margin-bottom:6px;}
.popup-section li{font-size:13px;color:#ccc;line-height:1.8;}
.popup-section ul{padding-left:16px;}
.popup-close{width:100%;margin-top:14px;padding:11px;background:var(--gold);color:#000;border:none;border-radius:9px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
/* FACTURA BUTTONS */
.factura-opts{display:flex;gap:10px;margin-top:4px;}
.factura-opt{flex:1;background:var(--dark3);border:2px solid var(--border);border-radius:10px;padding:12px 10px;cursor:pointer;text-align:center;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:5px;}
.factura-opt:hover{border-color:var(--gold);}
.factura-opt.selected{border-color:var(--gold);background:rgba(201,168,76,.08);}
.factura-icon{font-size:20px;}
.factura-lbl{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;}
.factura-nota{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--gold2);line-height:1.6;margin-top:8px;}
/* ANTICIPO */
.anticipo-box{background:var(--dark3);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:12px;}
.anticipo-title{font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.anticipo-opts{display:flex;gap:8px;}
.anticipo-opt{flex:1;background:var(--dark);border:2px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;}
.anticipo-opt:hover{border-color:var(--gold);}
.anticipo-opt.selected{border-color:var(--gold);background:rgba(201,168,76,.08);}
.ao-pct{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);font-weight:700;}
.ao-lbl{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.4;}
.anticipo-info{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.6;padding:8px 10px;background:rgba(255,255,255,.03);border-radius:7px;}
.ar-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.ar-row:last-child{border:none;}
.ar-lbl{color:var(--muted);}
.ar-val{font-weight:700;color:var(--gold);}
.ar-val.green{color:var(--green);font-size:16px;}
/* FLAVOR SUMMARY ROWS */
.flavor-sum-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.flavor-sum-row:last-child{border:none;}
.flavor-sum-num{color:var(--muted);font-size:12px;flex-shrink:0;padding-top:1px;}
.flavor-sum-info{display:flex;flex-direction:column;gap:2px;}
.flavor-sum-name{font-size:13px;font-weight:700;color:var(--text);}
.flavor-sum-brand{font-size:11px;color:var(--muted);}
.flavor-sum-brand.noalc-tag{color:#2ecc71;font-weight:600;}
/* SUMMARY */
.sum-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;gap:10px;}
.sum-row:last-child{border:none;}
.sum-lbl{color:var(--muted);font-size:11px;flex-shrink:0;}
.sum-val{font-weight:700;text-align:right;}
.sum-val.big{color:var(--green);font-size:22px;}
.sum-val.gold{color:var(--gold);font-size:17px;}
.fbadge{display:inline-block;padding:3px 9px;border-radius:12px;font-size:11px;margin:2px;}
.fbadge.alc{background:rgba(231,76,60,.15);color:#ffaaaa;border:1px solid rgba(231,76,60,.3);}
.fbadge.noalc{background:rgba(46,204,113,.15);color:#aaffcc;border:1px solid rgba(46,204,113,.3);}
/* AURA ONLY PANEL */
.aura-panel-header{background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(201,168,76,.04));border:1px solid rgba(201,168,76,.3);border-radius:var(--radius);padding:16px;margin-bottom:14px;text-align:center;}
.aura-panel-title{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);letter-spacing:2px;margin-bottom:6px;}
.aura-panel-sub{font-size:12px;color:var(--muted);line-height:1.5;}
/* EXTRA COSTS PANEL */
.extras-panel{background:var(--dark3);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.extras-title{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:1px;margin-bottom:12px;}
.extra-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.extra-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--gold);cursor:pointer;flex-shrink:0;}
.extra-item label{font-size:13px;cursor:pointer;flex:1;}
.extra-item .extra-amount{font-size:13px;font-weight:700;color:var(--green);min-width:90px;text-align:right;}
.extra-custom{display:flex;gap:8px;margin-top:10px;align-items:center;}
.extra-custom input{flex:1;background:var(--dark);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;}
.extra-custom input:focus{outline:none;border-color:var(--gold);}
.extras-total{display:flex;justify-content:space-between;padding:10px 0 0;border-top:1px solid var(--border);margin-top:10px;font-size:14px;font-weight:700;}
.extras-total span:last-child{color:var(--green);}
/* CONTRACT */
#contract-doc{background:#fff;color:#111;border-radius:12px;padding:26px;font-size:12.5px;line-height:1.85;margin-bottom:14px;}
#contract-doc h2{text-align:center;font-size:17px;margin-bottom:3px;}
#contract-doc .cdoc-sub{text-align:center;font-size:11px;color:#555;margin-bottom:16px;}
#contract-doc table{width:100%;border-collapse:collapse;margin-bottom:14px;}
#contract-doc td{padding:5px 8px;border:1px solid #ddd;}
#contract-doc td:first-child{font-weight:600;background:#f5f5f5;width:42%;}
#contract-doc .csec{margin:11px 0;}
#contract-doc .csec strong{display:block;font-size:13px;margin-bottom:3px;color:#111;}
#contract-doc .warn-box{background:#fff3cd;border-left:3px solid #ffc107;padding:8px 12px;font-size:12px;margin:8px 0;border-radius:4px;}
#contract-doc .sigs{display:flex;justify-content:space-between;margin-top:36px;gap:16px;flex-wrap:wrap;}
#contract-doc .sig-block{flex:1;min-width:180px;}
#contract-doc .sig-line{border-top:1px solid #333;padding-top:4px;font-size:11px;margin-top:28px;}
/* SIGNATURE PAD */
.sig-pad-wrap{border:2px dashed #ccc;border-radius:8px;margin-top:8px;overflow:hidden;position:relative;}
.sig-pad-wrap canvas{display:block;touch-action:none;}
.sig-pad-label{font-size:10px;color:#999;text-align:center;padding:4px;}
.sig-clear-btn{background:#f0f0f0;border:1px solid #ccc;border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer;margin-top:4px;}
/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 18px;border:none;border-radius:11px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;width:100%;}
.btn+.btn{margin-top:9px;}
.btn-gold{background:var(--gold);color:#000;}
.btn-gold:hover{background:var(--gold2);}
.btn-outline{background:transparent;border:2px solid var(--gold);color:var(--gold);}
.btn-outline:hover{background:rgba(201,168,76,.1);}
.btn-green{background:var(--green);color:#000;}
.btn-green:hover{filter:brightness(1.1);}
.btn-ghost{background:var(--dark3);color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--gold);}
.btn-wa{background:#25D366;color:#fff;}
.btn-wa:hover{filter:brightness(1.1);}
.nav-row{display:flex;gap:10px;margin-top:16px;}
.nav-row .btn{flex:1;}
/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--dark2);border-top:1px solid var(--border);display:flex;z-index:99;}
.bnav{flex:1;padding:9px 4px;background:none;border:none;color:var(--muted);font-family:'Nunito',sans-serif;font-size:9px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s;}
.bnav .bni{font-size:18px;}
.bnav.active{color:var(--gold);}
/* PRICE SCREEN */
.pref-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.pref-card{background:var(--dark3);border:1px solid var(--border);border-radius:9px;padding:11px;}
.pref-paq{font-size:10px;color:var(--muted);letter-spacing:1px;}
.pref-price{font-size:19px;font-weight:700;color:var(--green);}
.pref-sub{font-size:10px;color:var(--muted);}
.sec-lbl{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin:18px 0 9px;}
/* MENU SCREEN */
.menu-cat{margin-bottom:20px;}
.menu-cat-title{font-size:10px;letter-spacing:2px;color:var(--cyan);text-transform:uppercase;padding:6px 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.menu-cat-brand{font-size:10px;color:var(--muted);font-style:italic;margin-bottom:6px;}
/* ── DETAILS/SUMMARY COCKTAIL CARDS ── */
.mcd{display:block;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;margin:4px 0;padding:0;cursor:pointer;transition:background .2s;}
.mcd.alc{border-left:3px solid var(--gold);}
.mcd.noalc{border-left:3px solid var(--cyan);}
.mcd[open]{background:rgba(201,168,76,.08);}
.mcd-name{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;font-size:13px;font-weight:700;color:#eee;list-style:none;user-select:none;}
.mcd-name::-webkit-details-marker{display:none;}
.mcd-arrow{font-size:10px;color:var(--muted);transition:transform .2s;}
.mcd[open] .mcd-arrow{transform:rotate(180deg);}
.mcd-brand{font-size:11px;color:var(--gold2);background:rgba(201,168,76,.1);padding:3px 14px 6px;margin:0;}
.mcd-ing{padding:4px 14px 10px 28px;margin:0;}
.mcd-ing li{font-size:12px;color:#bbb;line-height:1.8;}
/* fchip div */
.fchip{display:block;border-radius:12px;margin:5px 0;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.fchip.alc{background:rgba(80,20,10,.5);border:1.5px solid rgba(201,120,80,.4);}
.fchip.noalc{background:rgba(10,30,50,.5);border:1.5px solid rgba(78,159,255,.3);}
.fchip.taken{opacity:.55;}
.fchip-sum{padding:11px 12px;display:flex;align-items:center;gap:8px;}
.fchip-name{font-size:13px;font-weight:700;flex:1;}
.fchip.alc .fchip-name{color:#f4a07a;}
.fchip.noalc .fchip-name{color:#8ec9ff;}
.fchip-expand{font-size:16px;color:#777;padding:2px 4px;transition:transform .2s;flex-shrink:0;}
.fchip.open .fchip-expand{transform:rotate(180deg);}
.fchip-body{display:none;padding:0 12px 10px;}
.fchip.open .fchip-body{display:block;}
.menu-chips-list{display:flex;flex-direction:column;gap:2px;}
/* ── FCHIP AS DETAILS ── */
.fchip-sum{list-style:none;padding:7px 10px;font-size:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center;gap:6px;cursor:pointer;}
.fchip-add{background:var(--gold);color:#000;border:none;border-radius:50%;width:22px;height:22px;font-size:14px;font-weight:800;cursor:pointer;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;line-height:1;padding:0;}
.fchip-add.taken{background:#555;color:#999;cursor:default;}
/* Checkbox style selector */
.fchip-check{width:20px;height:20px;border:2px solid var(--gold);border-radius:5px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:8px;cursor:pointer;background:transparent;transition:all .15s;}
.fchip-check.is-checked{background:var(--gold);border-color:var(--gold);}
.fchip-check.is-checked::after{content:'✓';color:#000;font-size:13px;font-weight:900;line-height:1;}
.fchip.taken .fchip-check:not(.is-checked){border-color:#444;cursor:default;}
.fchip-sum{list-style:none;padding:10px 12px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:0;cursor:pointer;}
.fchip-sum::-webkit-details-marker{display:none;}
.fchip-sum::-webkit-details-marker{display:none;}
.fchip-sum::after{content:"▾";font-size:9px;opacity:.6;}
.fchip[open] .fchip-sum::after{content:"▴";}
.fchip details{padding:0;}

.menu-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:18px;font-size:12px;margin:3px;cursor:pointer;}
.menu-chip.alc{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);color:#ffaaaa;}
.menu-chip.noalc{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.3);color:#aaffcc;}
.menu-chip:hover{filter:brightness(1.2);}
/* HISTORIAL */
.hist-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:13px;margin-bottom:9px;cursor:pointer;transition:border-color .2s;}
.hist-card:hover{border-color:var(--gold);}
.hc-top{display:flex;justify-content:space-between;}
.hc-name{font-weight:700;font-size:14px;}
.hc-price{color:var(--green);font-weight:700;font-size:15px;}
.hc-meta{font-size:11px;color:var(--muted);margin-top:3px;}
.badge{display:inline-block;padding:2px 7px;border-radius:9px;font-size:9px;letter-spacing:.8px;margin-right:3px;}
.b-alc{background:rgba(231,76,60,.15);color:#ffaaaa;}
.b-noalc{background:rgba(46,204,113,.15);color:#aaffcc;}
.b-mixa{background:rgba(155,89,182,.15);color:#cc88ff;}
.b-mixb{background:rgba(52,152,219,.15);color:#88ccff;}
#toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:var(--gold);color:#000;padding:9px 20px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;white-space:nowrap;}
#toast.show{opacity:1;}
.divider{height:1px;background:var(--border);margin:14px 0;}

/* ── FOLIO BADGE ── */
.folio-badge{display:inline-block;background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:4px;}
/* ── PAGO STATUS ── */
.pago-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.pago-btn{flex:1;min-width:120px;padding:6px 10px;border-radius:8px;border:1.5px solid #333;background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:.2s;text-align:center;}
.pago-btn.pagado{background:rgba(57,186,97,.15);border-color:#39ba61;color:#39ba61;}
.pago-btn.pendiente{background:rgba(255,80,80,.08);border-color:#ff5050;color:#ff5050;}
/* ── CONTRATO EDITABLE ── */
.contract-editable{background:#fff;color:#111;border-radius:12px;padding:20px;font-size:12.5px;line-height:1.85;}
.contract-editable [contenteditable]{outline:none;border-bottom:1px dashed #bbb;min-width:40px;display:inline-block;padding:0 2px;}
.contract-editable [contenteditable]:focus{border-bottom:2px solid var(--gold);background:rgba(201,168,76,.05);}
.edit-hint{font-size:10px;color:#888;text-align:center;padding:4px;margin-bottom:8px;background:#f5f5f5;border-radius:6px;}
/* ── COMPROBANTE ── */
.comprobante-wrap{margin-top:16px;}
.comp-field{margin:8px 0;}
.comp-field label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px;}
.comp-field input{width:100%;background:var(--card);border:1px solid #2a2a2a;border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;}
/* ── PIN OVERLAY ── */
.pin-overlay{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.97);display:flex;align-items:center;justify-content:center;padding:20px;}
.pin-box{background:#141414;border:1.5px solid var(--gold);border-radius:20px;padding:28px 24px;max-width:340px;width:100%;text-align:center;}
.pin-title{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);letter-spacing:2px;margin-bottom:4px;}
.pin-sub{font-size:12px;color:var(--muted);margin-bottom:22px;}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:20px;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #444;background:transparent;transition:all .2s;}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);}
.pin-dot.error{background:#ff4444;border-color:#ff4444;}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto;}
.pin-key{background:#1c1c1c;border:1.5px solid #2a2a2a;border-radius:12px;padding:16px;font-size:22px;font-weight:700;color:var(--text);cursor:pointer;transition:all .15s;font-family:'Nunito',sans-serif;-webkit-tap-highlight-color:transparent;}
.pin-key:active{background:rgba(201,168,76,.2);border-color:var(--gold);transform:scale(.94);}
.pin-key.del{font-size:16px;color:var(--muted);}
.pin-key.zero{grid-column:2;}
.pin-error-msg{font-size:12px;color:#ff6666;margin-top:10px;min-height:18px;}
/* ── FLAVOR CHECKBOXES MEJORADOS ── */
.fchip-check-v2{width:24px;height:24px;border:2.5px solid #555;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;background:transparent;transition:all .15s;margin-right:6px;}
.fchip.alc .fchip-check-v2{border-color:rgba(231,76,60,.5);}
.fchip.noalc .fchip-check-v2{border-color:rgba(78,159,255,.4);}
.fchip-check-v2.is-checked{background:var(--gold);border-color:var(--gold);}
.fchip-check-v2.is-checked::after{content:'✓';color:#000;font-size:15px;font-weight:900;line-height:1;}
.fchip.alc.selected-chip{background:rgba(231,76,60,.2);border-color:rgba(231,76,60,.7);}
.fchip.noalc.selected-chip{background:rgba(78,159,255,.15);border-color:rgba(78,159,255,.6);}
/* ── SEND DOC BUTTONS ── */
.send-doc-btn{display:flex;align-items:center;gap:8px;width:100%;padding:12px 16px;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-bottom:8px;}
.send-doc-btn.wa{background:#25D366;color:#fff;}
.send-doc-btn.wa:hover{filter:brightness(1.1);}
.send-doc-btn.copy{background:#1565c0;color:#fff;}
.send-doc-btn.text-only{background:#333;color:#eee;border:1px solid #444;}
/* ── DATOS BANCARIOS ── */
.bank-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(201,168,76,.3);border-radius:14px;padding:18px;margin-bottom:14px;}
.bank-title{color:var(--gold);font-size:13px;font-weight:700;margin-bottom:12px;text-align:center;letter-spacing:1px;}
.bank-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #2a2a2a;}
.bank-item:last-child{border-bottom:none;}
.bank-lbl{font-size:11px;color:var(--muted);}
.bank-val{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.5px;}
.bank-copy{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);color:var(--gold);border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;white-space:nowrap;}
.bank-copy:active{background:rgba(201,168,76,.35);}
.bank-img{width:100%;border-radius:10px;margin-bottom:12px;}
/* ── POLITICAS ── */
.pol-btn{width:100%;padding:12px;background:rgba(57,186,97,.1);border:1.5px solid #39ba61;color:#39ba61;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:10px;}
/* ── HIST IMPROVED ── */
.hc-folio{font-size:10px;color:var(--gold);font-weight:700;margin-bottom:2px;}
.hc-pagos{display:flex;gap:6px;margin-top:5px;}
.hc-pago-tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;}
.hc-pago-tag.ok{background:rgba(57,186,97,.15);color:#39ba61;}
.hc-pago-tag.pend{background:rgba(255,80,80,.08);color:#ff5050;}


/* ── DOC MODAL ── */
#doc-modal table{width:100%;border-collapse:collapse;margin:10px 0;}
#doc-modal td{border:1px solid #ccc;padding:5px 8px;}
#doc-modal td:first-child{font-weight:600;background:#f5f5f5;width:40%;}
#doc-modal ul{padding-left:16px;}
#doc-modal li{margin-bottom:3px;}
#doc-modal [contenteditable]{border-bottom:1px dashed #aaa;outline:none;min-width:30px;display:inline-block;}
#doc-modal [contenteditable]:focus{background:rgba(201,168,76,.08);border-bottom:2px solid #c9a84c;}
.edit-hint{display:none;}
@media print{
  body > *:not(#doc-modal){display:none!important;}
  #doc-modal{display:block!important;position:static!important;background:#fff!important;overflow:visible!important;}
  #doc-modal > div > div:first-child{display:none!important;}
  #doc-modal > div{padding:0!important;max-width:100%!important;}
  #doc-modal-content{border-radius:0!important;}
  canvas{display:none;}
  .sig-clear-btn{display:none!important;}
  #sig-print-img{display:block!important;}
}
